services:
  api:
    platform: linux/amd64
    build:
      context: ./backend
    container_name: ocr_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ocr}:${POSTGRES_PASSWORD:-ocrpass}@db:${POSTGRES_PORT:-5433}/${POSTGRES_DB:-ocr}
    volumes:
      - ./backend/app:/app/app:ro
      - ocr_data:/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --proxy-headers

  worker:
    platform: linux/amd64
    build:
      context: ./backend
    container_name: ocr_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ocr}:${POSTGRES_PASSWORD:-ocrpass}@db:${POSTGRES_PORT:-5433}/${POSTGRES_DB:-ocr}
    volumes:
      - ./backend/app:/app/app:ro
      - ocr_data:/data
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    command: >
      sh -c "celery -A app.worker.celery_app.celery worker
      --loglevel=INFO
      --pool=prefork
      --queues=${CELERY_TASK_DEFAULT_QUEUE:-jobs}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --concurrency=${CELERY_CONCURRENCY:-4}
      --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-25}"

  redis:
    image: redis:7-alpine
    container_name: ocr_redis
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    container_name: ocr_db
    command: ["postgres", "-p", "${POSTGRES_PORT:-5433}"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ocr}
      POSTGRES_USER: ${POSTGRES_USER:-ocr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ocrpass}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocr} -d ${POSTGRES_DB:-ocr} -p ${POSTGRES_PORT:-5433}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    ports:
      - "${POSTGRES_PORT:-5433}:${POSTGRES_PORT:-5433}"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
  ocr_data:
