<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Bank Statement Analyzer</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Login page specific styles */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--gray-50) 0%, var(--primary-50) 100%);
      padding: var(--space-4);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background-color: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg);
      padding: var(--space-8);
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--primary-500), var(--primary-700));
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: var(--font-bold);
      font-size: var(--text-xl);
      margin: 0 auto var(--space-4);
    }

    .login-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--text-primary);
      margin-bottom: var(--space-2);
    }

    .login-description {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
    }

    .login-footer {
      margin-top: var(--space-6);
      padding-top: var(--space-6);
      border-top: 1px solid var(--border-subtle);
      text-align: center;
    }

    .login-footer-text {
      font-size: var(--text-sm);
      color: var(--text-secondary);
    }

    .login-alert {
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .login-alert-error {
      background-color: var(--error-50);
      border: 1px solid var(--error-100);
      color: var(--error-700);
    }

    .login-alert-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: var(--space-6);
      }
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">BSA</div>
        <h1 class="login-title">Welcome back</h1>
        <p class="login-description">Sign in to access the Bank Statement Analyzer</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            class="form-input" 
            placeholder="Enter your username"
            required
            autocomplete="username"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          >
        </div>

        <div class="login-alert login-alert-error hidden" id="loginError">
          <svg class="login-alert-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span>Invalid username or password. Please try again.</span>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="loginBtn">
          Sign In
        </button>
      </form>

      <div class="login-footer">
        <p class="login-footer-text">
          Use your evaluator or admin account credentials
        </p>
      </div>
    </div>
  </div>

  <script>
    // Login form handling
    const loginForm = document.getElementById('loginForm');
    const loginError = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Hide previous error
      loginError.classList.add('hidden');
      
      // Show loading state
      const originalText = loginBtn.textContent;
      loginBtn.disabled = true;
      loginBtn.innerHTML = `
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        Signing in...
      `;

      try {
        const formData = new FormData(loginForm);
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            username: formData.get('username'),
            password: formData.get('password')
          })
        });

        if (response.ok) {
          // Redirect to main app
          window.location.href = '/';
        } else {
          throw new Error('Login failed');
        }
      } catch (error) {
        loginError.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.textContent = originalText;
      }
    });

    // Add spin animation
    const style = document.createElement('style');
    style.textContent = `
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
